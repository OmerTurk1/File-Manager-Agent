<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CoreAgent Dashboard</title>
        
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body class="text-zinc-300 min-h-screen flex flex-col bg-[#09090b]">

        <header class="border-b border-zinc-800 bg-[#09090b] px-6 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2.5">
                <span class="text-sm font-medium tracking-tight text-zinc-100">CoreAgent</span>
                <span class="text-[11px] font-mono px-1.5 py-0.5 bg-zinc-800 rounded text-zinc-400">v2.0</span>
            </div>
            <div class="flex items-center space-x-3">
                <div id="status-badge" class="text-[11px] font-mono text-zinc-400 bg-zinc-900 border border-zinc-800 px-2.5 py-1 rounded">
                    io.status: idle
                </div>
            </div>
        </header>

        <main class="flex-1 grid grid-cols-1 lg:grid-cols-4 h-[calc(100vh-53px)] overflow-hidden">
            
            <section class="lg:col-span-1 border-r border-zinc-800 p-6 flex flex-col justify-between bg-[#09090b] overflow-y-auto">
                <div class="space-y-6">
                    <div>
                        <h2 class="text-xs font-medium text-zinc-400 uppercase tracking-wider">System Configuration</h2>
                        <p class="text-[11px] text-zinc-500 mt-0.5">Adjust execution boundaries and keys.</p>
                    </div>

                    <form id="preferences-form" class="space-y-4">
                        <div class="space-y-1">
                            <label class="block text-[11px] font-mono text-zinc-400">MAIN_ROOT_FOLDER</label>
                            <input type="text" id="pref-root" name="MAIN_ROOT_FOLDER" 
                                value="{{ preferences.get('MAIN_ROOT_FOLDER', '') }}" 
                                class="w-full bg-zinc-900 border border-zinc-800 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-zinc-500 text-zinc-200 transition">
                        </div>

                        <div class="space-y-1">
                            <label class="block text-[11px] font-mono text-zinc-400">VIEWABLE_FOLDER_ROOT</label>
                            <input type="text" id="pref-viewable" name="VIEWABLE_FOLDER_ROOT" 
                                value="{{ preferences.get('VIEWABLE_FOLDER_ROOT', '') }}" 
                                class="w-full bg-zinc-900 border border-zinc-800 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-zinc-500 text-zinc-200 transition">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="block text-[11px] font-mono text-zinc-400">FRONT_CHARS</label>
                                <input type="number" id="pref-front" name="FRONT_CHARS" 
                                    value="{{ preferences.get('FRONT_CHARS', 12) }}" 
                                    class="w-full bg-zinc-900 border border-zinc-800 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-zinc-500 text-zinc-200 transition">
                            </div>
                            <div class="space-y-1">
                                <label class="block text-[11px] font-mono text-zinc-400">BACK_CHARS</label>
                                <input type="number" id="pref-back" name="BACK_CHARS" 
                                    value="{{ preferences.get('BACK_CHARS', 10) }}" 
                                    class="w-full bg-zinc-900 border border-zinc-800 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-zinc-500 text-zinc-200 transition">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="block text-[11px] font-mono text-zinc-400">OPENAI_API_KEY</label>
                            <input type="password" id="pref-key" name="OPENAI_API_KEY" 
                                placeholder="{% if preferences.get('OPENAI_API_KEY') %}•••••••••••••••• (Kayıtlı){% else %}API Key girin...{% endif %}" 
                                class="w-full bg-zinc-900 border border-zinc-800 rounded px-3 py-1.5 text-xs focus:outline-none focus:border-zinc-500 text-zinc-200 transition">
                        </div>

                        <button type="button" onclick="savePreferences()" class="w-full bg-zinc-100 hover:bg-zinc-200 text-zinc-900 font-medium py-1.5 rounded text-xs transition">
                            Save Preferences
                        </button>
                    </form>
                </div>
            </section>

            <section class="lg:col-span-3 flex flex-col h-[calc(100vh-53px)] max-h-[calc(100vh-53px)] bg-[#09090b] overflow-hidden">
                <div id="terminal" class="flex-1 p-6 overflow-y-auto min-h-0 space-y-4 bg-[#09090b] flex flex-col">
                    <div class="chat-row system-row">
                        <div class="text-zinc-600 font-mono text-xs text-center">// Console initialized. Awaiting pipeline instruction...</div>
                    </div>
                </div>

                <div class="p-4 border-t border-zinc-800 bg-[#09090b] flex-shrink-0">
                    <div class="max-w-4xl mx-auto flex space-x-2">
                        <input type="text" id="user-input" placeholder="Ask agent to perform a task..." 
                            class="flex-1 bg-zinc-900 border border-zinc-800 rounded px-3.5 py-2 text-xs focus:outline-none focus:border-zinc-500 text-zinc-200 placeholder-zinc-600"
                            onkeydown="if(event.key === 'Enter') startAgentTask()">
                        <button id="run-btn" onclick="startAgentTask()" class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-zinc-100 px-4 py-2 rounded text-xs font-medium transition">
                            Execute
                        </button>
                    </div>
                </div>
            </section>
        </main>
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    </body>
</html>
